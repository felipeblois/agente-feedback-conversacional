{% extends "base.html" %}

{% block title %}Obrigado!{% endblock %}

{% block content %}
<div class="chat-container" style="justify-content: center; align-items: center; padding: 40px;">
    <div class="start-card" style="max-width: 560px; text-align: center;">
        <div style="font-size: 2.2rem; font-weight: 700; margin-bottom: 0.75rem;">Obrigado pelo seu tempo</div>
        <h2 style="margin: 0 0 0.85rem 0;">Seu feedback foi enviado com sucesso.</h2>
        <p style="margin: 0 0 1rem 0; color: var(--text-muted);">
            Suas respostas nos ajudarao muito a melhorar as proximas sessoes.
        </p>
        <p style="margin: 0; color: var(--text-muted);">
            Voce pode fechar sua janela agora.
        </p>
    </div>
</div>
{% endblock %}
